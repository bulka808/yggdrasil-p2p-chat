plugins {
    id 'java'
    id 'org.jetbrains.kotlin.jvm' version '2.4.0'
    id 'org.jetbrains.compose' version '1.11.1'
    id 'org.jetbrains.kotlin.plugin.compose' version '2.4.0'
}

group = 'dev.p2pchat'
version = '1.0-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

compose.desktop {
    application {
        mainClass = 'dev.p2pchat.MainKt'
    }
}

kotlin {
    jvmToolchain(21)
}

repositories {
    mavenCentral()
    google()
    maven { url = uri("https://maven.pkg.jetbrains.space/public/p/compose/dev") }
}

dependencies {
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation("tech.kwik:kwik:0.10.10")
    implementation("org.bouncycastle:bcprov-jdk18on:1.80")
    implementation("org.bouncycastle:bcpkix-jdk18on:1.80")
    implementation("org.msgpack:msgpack-core:0.8.3")
    implementation("org.xerial:sqlite-jdbc:3.49.1.0")
    implementation("org.yaml:snakeyaml:2.2")
    implementation("org.slf4j:slf4j-simple:2.0.13")
    implementation(compose.desktop.currentOs)
    implementation(compose.material3)
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs.add('--enable-preview')
}

tasks.withType(Test).configureEach {
    jvmArgs('--enable-preview')
}

test {
    useJUnitPlatform()
}

task jpackageApp(type: Exec) {
    dependsOn jar
    def jarFile = jar.archiveFile.get().asFile
    def imageDir = file("${buildDir}/jpackage")
    def stagingDir = file("${buildDir}/jpackage-staging")

    doFirst {
        delete imageDir
        delete stagingDir
        stagingDir.mkdirs()
        copy {
            from sourceSets.main.runtimeClasspath
            into stagingDir
        }
        copy {
            from jarFile
            into stagingDir
        }
    }

    commandLine 'jpackage',
            '--input', stagingDir.absolutePath,
            '--main-jar', jarFile.name,
            '--main-class', 'dev.p2pchat.MainKt',
            '--name', 'P2PChat',
            '--dest', imageDir.absolutePath,
            '--type', 'app-image',
            '--java-options', '--enable-preview',
            '--jlink-options', '--strip-debug --compress=zip-6 --no-header-files --no-man-pages'
}